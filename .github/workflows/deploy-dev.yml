name: Deploy to Dev Server

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'pom.xml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    env:
      DEPLOY_DIR: C:\deploy\dev
      SERVICE_PORT: 9091
      SPRING_PROFILE: dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build JAR
      shell: cmd
      run: mvnw.cmd clean package -DskipTests

    - name: Stop existing service
      shell: cmd
      run: |
        taskkill /F /FI "WINDOWTITLE eq dwisCOST-dev" 2>nul
        timeout /t 3 /nobreak >nul
      continue-on-error: true

    - name: Deploy JAR
      shell: cmd
      run: |
        if not exist "%DEPLOY_DIR%" mkdir "%DEPLOY_DIR%"
        if not exist "%DEPLOY_DIR%\backup" mkdir "%DEPLOY_DIR%\backup"
        if not exist "%DEPLOY_DIR%\logs" mkdir "%DEPLOY_DIR%\logs"
        for %%f in (target\*.jar) do (
          echo %%f | findstr /v ".original" >nul && (
            copy "%%f" "%DEPLOY_DIR%\dwisCOST.jar" /Y
            echo Deployed: %%f
          )
        )

    - name: Start service
      shell: cmd
      run: |
        start "dwisCOST-dev" java -jar "%DEPLOY_DIR%\dwisCOST.jar" --server.port=%SERVICE_PORT% --spring.profiles.active=%SPRING_PROFILE%
        echo Service starting on port %SERVICE_PORT%...

    - name: Health check
      shell: cmd
      run: |
        echo Waiting 30 seconds for startup...
        timeout /t 30 /nobreak >nul
        curl -s -o nul -w "HTTP Status: %%{http_code}" http://localhost:%SERVICE_PORT%/actuator/health || echo Service may still be starting...
