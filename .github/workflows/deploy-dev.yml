name: Deploy to Dev Server

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'pom.xml'

  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    env:
      DEPLOY_DIR: C:\deploy\dev
      SERVICE_PORT: 9091
      SPRING_PROFILE: dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check environment
      shell: cmd
      run: |
        echo === Java ===
        java -version
        echo === Node ===
        node --version
        echo === npm ===
        npm --version

    - name: Install Vue dependencies
      shell: cmd
      run: |
        if exist node_modules rmdir /s /q node_modules
        npm install
      working-directory: src/main/vue

    - name: Build Vue (dev)
      shell: cmd
      run: npm run builddev
      working-directory: src/main/vue

    - name: Build JAR
      shell: cmd
      run: mvnw.cmd clean package -DskipTests

    - name: Stop existing service
      shell: cmd
      run: |
        echo Stopping existing service...
        taskkill /F /FI "WINDOWTITLE eq dwisCOST-dev" 2>nul
        timeout /t 3 /nobreak >nul
        echo Done.
      continue-on-error: true

    - name: Deploy JAR
      shell: cmd
      run: |
        if not exist "%DEPLOY_DIR%" mkdir "%DEPLOY_DIR%"
        if not exist "%DEPLOY_DIR%\backup" mkdir "%DEPLOY_DIR%\backup"
        if not exist "%DEPLOY_DIR%\logs" mkdir "%DEPLOY_DIR%\logs"
        
        REM 이전 JAR 백업
        if exist "%DEPLOY_DIR%\dwisCOST.jar" (
          for /f "tokens=2 delims==" %%I in ('wmic os get localdatetime /value') do set dt=%%I
          copy "%DEPLOY_DIR%\dwisCOST.jar" "%DEPLOY_DIR%\backup\dwisCOST_%dt:~0,8%_%dt:~8,6%.jar"
        )
        
        REM 새 JAR 복사
        for %%f in (target\*.jar) do (
          echo %%f | findstr /v ".original" >nul && (
            copy "%%f" "%DEPLOY_DIR%\dwisCOST.jar"
            echo Deployed: %%f
          )
        )

    - name: Start service
      shell: cmd
      run: |
        start "dwisCOST-dev" java -jar "%DEPLOY_DIR%\dwisCOST.jar" --server.port=%SERVICE_PORT% --spring.profiles.active=%SPRING_PROFILE%
        echo Service starting on port %SERVICE_PORT%...

    - name: Health check
      shell: cmd
      run: |
        echo Waiting 30 seconds for startup...
        timeout /t 30 /nobreak >nul
        curl -s -o nul -w "HTTP Status: %%{http_code}" http://localhost:%SERVICE_PORT%/actuator/health || echo Service may still be starting...
